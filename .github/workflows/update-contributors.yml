name: Update Contributors

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate contributors list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch human contributors (exclude bots)
          CONTRIBUTORS=$(gh api repos/librefang/librefang/contributors \
            --jq '[.[] | select(.type == "User")] | sort_by(-.contributions) | .[].login')

          # Build HTML
          HTML=""
          for user in $CONTRIBUTORS; do
            HTML="${HTML}<a href=\"https://github.com/${user}\"><img src=\"https://github.com/${user}.png\" width=\"50\" height=\"50\" alt=\"${user}\" /></a>\n"
          done

          # Replace between markers
          sed -i '/<!-- CONTRIBUTORS-START -->/,/<!-- CONTRIBUTORS-END -->/{
            /<!-- CONTRIBUTORS-START -->/{
              a\
          '"$(echo -e "$HTML" | sed 's/$/\\/' | sed '$ s/\\$//')"'
            }
            /<!-- CONTRIBUTORS-END -->/!d
          }' README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update contributors list [skip ci]"
          git push
