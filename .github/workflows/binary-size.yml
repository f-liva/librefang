name: Binary Size

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release --bin librefang 2>/dev/null
          SIZE_BYTES=$(stat -c%s target/release/librefang 2>/dev/null || echo 0)

          if [ "$SIZE_BYTES" -eq 0 ]; then
            echo "Could not measure binary size"
            exit 1
          fi

          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          {
            echo "## Binary Size"
            echo ""
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Binary: \`librefang\`"
            echo "- Size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          } >> "$GITHUB_STEP_SUMMARY"
